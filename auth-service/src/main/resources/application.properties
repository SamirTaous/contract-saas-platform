spring.application.name=auth-service
server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/smart_contract_db
spring.datasource.username=postgres
spring.datasource.password=080317st
spring.datasource.driver-class-name=org.postgresql.Driver

# 3. JPA / Hibernate Configuration
# 'update' automatically creates/updates tables based on your @Entity classes
spring.jpa.hibernate.ddl-auto=update
# Shows the SQL queries in the console (very helpful for debugging)
spring.jpa.show-sql=true
# Formats the SQL in the console so it's readable
spring.jpa.properties.hibernate.format_sql=true
# Specifies the PostgreSQL dialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect